<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foreman Work Input</title>
<style>
 #areaButtons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.area-btn {
  padding: 10px 18px;
  border: 1px solid #ccc;
  background: #f1f1f1;
  cursor: pointer;
  border-radius: 20px;   /* ✅ 둥근 모서리 */
}

.area-btn.active {
  background: #007bff;
  color: white;
  border-color: #007bff;
}
</style>
</head>
<body>
  <h2>Foreman Work Input</h2>

  <div>
    <label>Foreman Name</label>
    <input type="text" id="foremanName">
  </div>
  <br>

  <div>
    <label>Plot</label>
    <select id="plot">
      <option value="PLOT-C">PLOT-C</option>
      <option value="PLOT-D">PLOT-D</option>
    </select>
  </div>
  <br>

 
<div>
  <label>Work Area</label><br>

  <div id="areaButtons">
  <button type="button" class="area-btn" data-value="All">All</button>
  <button type="button" class="area-btn" data-value="Tower">Tower</button>
  <button type="button" class="area-btn" data-value="Podium">Podium</button>
  <button type="button" class="area-btn" data-value="LG">LG</button>
  <button type="button" class="area-btn" data-value="Basement">Basement</button>
</div>
</div>
<br>


  <div>
    <label>Work Type</label>
    <select id="workType">
      <option value="ELV1(FA,ACS)">ELV1(FA,ACS)</option>
      <option value="ELV(Honeywell)">ELV(Honeywell)</option>
      <option value="Defect">Defect</option>
      <option value="Snag">Snag</option>
      <option value="LV">LV</option>
      <option value="scaffolder">scaffolder</option>
      <option value="ABD">ABD</option>
      <option value="LCS">LCS</option>
      <option value="TEMP">TEMP</option>
      <option value="Energize">Energize</option>
    </select>
  </div>
  <br>

  <div>
    <label>Location</label>
    <input type="text" id="location">
  </div>
  <br>

  <div>
    <label>Number of Workers</label>
    <input type="number" id="people">
  </div>
  <br>

  <div>
    <label>Work Description</label><br>
    <textarea id="description" rows="4" cols="40"></textarea>
  </div>
  <br>

  <!-- ✅ id 추가 -->
  <button id="submitBtn" onclick="sendData()">Submit</button>
   
<hr>

<div id="noticeBox" style="
  margin-top:20px;
  padding:15px;
  border:2px solid red;
  background:#fff5f5;
  color:red;
  font-size:20px;
  font-weight:bold;
  text-align:center;
">
Notice...
</div>

<hr>

<h3>🔑 Master Key Tracker</h3>

<div style="margin-top:10px; padding:15px; border:1px solid #ccc; border-radius:10px;">

  <div>
    <label>Area</label>
    <select id="keyArea">
      <option value="T-Room">T-Room</option>
      <option value="T-Terracotta">T-Terracotta</option>
      <option value="Basement LG">Basement LG</option>
      <option value="Podium">Podium</option>
    </select>
  </div>
  <br>

  <div>
  <label>Plot (Auto from above selection)</label>
   
  </div>
  <br>

  <div>
    <label>Name</label>
    <input type="text" id="keyName">
  </div>
  <br>

  <div>
    <label>Contact</label>
    <input type="text" id="keyContact">
  </div>
  <br>

  <button id="keySubmitBtn" onclick="sendKeyData()">Submit Key Borrow</button>

</div>


  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  

import { 
  getFirestore, 
  collection, 
  addDoc, 
  serverTimestamp,
  doc,
  onSnapshot     // ✅ 이 두 개 추가
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


    const firebaseConfig = {
      apiKey: "AIzaSyA4ifZEP4N_Ch9e0r_4hwvXNZgXFwbFM1c",
      authDomain: "ppaenjji-ac949.firebaseapp.com",
      projectId: "ppaenjji-ac949",
      storageBucket: "ppaenjji-ac949.firebasestorage.app",
      messagingSenderId: "1092159188617",
      appId: "1:1092159188617:web:5cf3e69df069d4a8c32058"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);



window.addEventListener("DOMContentLoaded", () => {
  const noticeBox = document.getElementById("noticeBox");

  onSnapshot(doc(db, "config", "notice"), (docSnap) => {
    if (docSnap.exists) {   // ✅ 여기 수정
noticeBox.innerHTML = `📢 ${docSnap.data().message}`;
    } else {
      noticeBox.textContent = "Notice..";
    }
  });
});

       

document.getElementById("foremanName").value =
  localStorage.getItem("foremanName") || "";
 

   window.sendData = async function () {

  const btn = document.getElementById("submitBtn");

  btn.disabled = true;
  btn.textContent = "Submitting...";


const foremanName = document.getElementById("foremanName").value.trim();

if (!foremanName) {
  alert("Please enter Foreman Name");
  btn.disabled = false;
  btn.textContent = "Submit";
  return;
}



  try {

    // ✅ 버튼에서 선택된 값 가져오기
    let selectedAreas = Array.from(document.querySelectorAll(".area-btn.active"))
      .map(btn => btn.dataset.value);

if (selectedAreas.length === 0) {
  alert("Please select Work Area");
  btn.disabled = false;
  btn.textContent = "Submit";
  return;
}

    // ✅ All 선택 처리
    if (selectedAreas.includes("All")) {
      selectedAreas = ["All"];
    }

    await addDoc(collection(db, "workData"), {

      foremanName: document.getElementById("foremanName").value,
      plot: document.getElementById("plot").value,

      // ✅ 여기 유지
      area: selectedAreas.join(", "),
     // ✅ 포맨 이름 저장

      workType: document.getElementById("workType").value,
      location: document.getElementById("location").value,
      people: Number(document.getElementById("people").value || 0),
      description: document.getElementById("description").value,
      createdAt: serverTimestamp(),
      dateText: new Date().toLocaleDateString("en-GB"),
      timeText: new Date().toLocaleTimeString("en-GB")

    });
localStorage.setItem("foremanName", document.getElementById("foremanName").value);
    alert("Submitted successfully");

// ✅ 제출 후 초기화
document.querySelectorAll(".area-btn").forEach(btn => btn.classList.remove("active"));
document.getElementById("location").value = "";
document.getElementById("people").value = "";
document.getElementById("description").value = "";
btn.disabled = false;
btn.textContent = "Submit";


  } catch (error) {
    console.error(error);
    alert("Submission failed: " + error.message);

    btn.disabled = false;
    btn.textContent = "Submit";
  }
};
const areaButtons = document.querySelectorAll(".area-btn");

areaButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const value = btn.dataset.value;

    if (value === "All") {
      // ✅ All만 선택
      areaButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    } else {
      // ✅ All 해제
      areaButtons.forEach(b => {
        if (b.dataset.value === "All") b.classList.remove("active");
      });

      // ✅ toggle (켜기/끄기)
      btn.classList.toggle("active");
    }
  });
});
window.sendKeyData = async function () {

  const btn = document.getElementById("keySubmitBtn");

  btn.disabled = true;
  btn.textContent = "Submitting...";

  const name = document.getElementById("keyName").value.trim() ||
  document.getElementById("foremanName").value.trim();
  const contact = document.getElementById("keyContact").value.trim();

  if (!name || !contact) {
    alert("Please enter Name and Contact");
    btn.disabled = false;
    btn.textContent = "Submit Key Borrow";
    return;
  }

  try {

    await addDoc(collection(db, "masterKey"), {

      area: document.getElementById("keyArea").value,
      plot: document.getElementById("plot").value,
      name: name,
      contact: contact,

      status: "Borrowed",   // ✅ 핵심
      createdAt: serverTimestamp()

    });

    alert("Key Borrowed Successfully");

    // ✅ 초기화
    document.getElementById("keyName").value = "";
    document.getElementById("keyContact").value = "";

    btn.disabled = false;
    btn.textContent = "Submit Key Borrow";

  } catch (error) {
    console.error(error);
    alert("Error: " + error.message);

    btn.disabled = false;
    btn.textContent = "Submit Key Borrow";
  }
};


  </script>
</body>
</html>
