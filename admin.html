
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>관리자 현황판</title>

<body>
  <h2>관리자 현황판</h2>

  <!-- ✅ 필터 영역 -->
  <div style="margin-bottom:20px; padding:10px; border:1px solid #ccc;">
    <h3>필터</h3>

    <label>날짜 선택: </label>
    <select id="dateFilter">
      <option value="ALL">전체 날짜</option>
    </select>

    <label style="margin-left:20px;">플롯 선택: </label>
    <select id="plotFilter">
      <option value="ALL">전체</option>
      <option value="PLOT-C">PLOT-C</option>
      <option value="PLOT-D">PLOT-D</option>
    </select>

    <label style="margin-left:20px;">포맨 선택: </label>
    <select id="foremanFilter">
      <option value="ALL">전체 포맨</option>
    </select>

    <button id="resetFilterBtn" style="margin-left:20px;">필터 초기화</button>
  </div>

  <!-- ✅ 날짜별 집계표 -->
  <h3>날짜별 인원 집계 (보고용)</h3>

    <thead>
      <tr>
        <th>날짜</th>
        <th>총 인원</th>
        <th>PLOT-C</th>
        <th>PLOT-D</th>
        <th>ELV1(FA,ACS)</th>
        <th>ELV(Honeywell)</th>
        <th>Defect</th>
        <th>Snag</th>
        <th>LCS</th>
        <th>TEMP</th>
      </tr>
    </thead>
    <tbody id="summaryBody"></tbody>
  </table>

        <th>삭제</th>
